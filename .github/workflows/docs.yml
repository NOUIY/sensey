name: Deploy Docs

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Determine version
        run: |
          VERSION="latest"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Restore previous docs for versioning plugin
        run: |
          mkdir -p build/dokka
          git fetch origin gh-pages --depth=1 2>/dev/null || true
          if git show-ref --verify refs/remotes/origin/gh-pages 2>/dev/null; then
            git checkout origin/gh-pages -- . 2>/dev/null || true
            for dir in */; do
              if [ -d "$dir" ] && [ "$dir" != "sensey/" ] && [ "$dir" != "sample/" ]; then
                cp -r "$dir" build/dokka/ 2>/dev/null || true
              fi
            done
          fi
          git checkout -f "$GITHUB_SHA"

      - name: Generate documentation
        run: ./gradlew :sensey:dokkaGeneratePublicationHtml --no-configuration-cache

      - name: Organize versioned output
        run: |
          VERSION="${{ env.VERSION }}"
          mkdir -p docs/"$VERSION"
          if [ -d sensey/build/dokka/html ]; then
            cp -r sensey/build/dokka/html/* docs/"$VERSION"/
            rm -rf docs/latest
            cp -r docs/"$VERSION" docs/latest
          fi
          ./scripts/generate-docs-index.sh "$VERSION"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
